org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
kotlin.code.style=official
kotlin.stdlib.default.dependency=false

# Plugin metadata
pluginGroup=org.mozilla.phabricator
pluginName=phabricator-review-intellij
pluginVersion=0.5.2
# Plugin compatibility range. `pluginUntilBuild` left empty intentionally:
# build.gradle.kts treats empty as "do not emit until-build attribute" so the
# plugin advertises compatibility with every IDE build >= pluginSinceBuild.
pluginSinceBuild=243
pluginUntilBuild=

# IntelliJ Platform target (2024.3 = build 243)
platformType=IC
platformVersion=2024.3

# JVM
javaVersion=21
